name: Deploy Theme to Xserver

on:
  push:
    branches:
      - main # mainブランチにPushされたときに起動します

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # 👇 ここが「server」になっているか確認（host はNG）
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          # 👇 ここが「local-dir」になっているか確認（アンダーバーではなくハイフン）
          local-dir: ./
          # 👇 ここが「server-dir」になっているか確認（remote_dir はNG）
          # ※あなたのアカウントの実際のパスに書き換えてください！
          server-dir: /yamaportfolio.jp/public_html/designo.yamaportfolio.jp/wp-content/themes/designo-theme/